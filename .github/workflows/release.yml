name: Create Release

# Trigger this workflow manually or when a version tag is pushed
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Create GitHub Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for changelog generation
      
      - name: Set version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          else
            VERSION="${{ github.event.inputs.version }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "Release version: $VERSION"
      
      - name: Verify version in style.css
        id: verify-version
        run: |
          STYLE_VERSION=$(grep -oP 'Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' style.css)
          EXPECTED_VERSION="${{ steps.version.outputs.version }}"
          
          echo "style.css version: $STYLE_VERSION"
          echo "Expected version: $EXPECTED_VERSION"
          
          if [ "$STYLE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "style.css has version $STYLE_VERSION but expected $EXPECTED_VERSION"
            echo "Please run: php scripts/bump-version.php $EXPECTED_VERSION"
            exit 1
          fi
          
          echo "✅ Version verified"
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none
      
      - name: Install Node dependencies
        run: npm ci
      
      - name: Build theme assets
        run: npm run build
      
      - name: Install Composer dependencies (production only)
        run: composer install --no-dev --optimize-autoloader --no-progress --prefer-dist
      
      - name: Create release package
        run: |
          mkdir -p release-package
          
          echo "Creating release package for mbn-theme v${{ steps.version.outputs.version }}"
          
          # Copy theme files, excluding development assets
          rsync -av \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.cursor' \
            --exclude='.husky' \
            --exclude='release-package' \
            --exclude='resources/css' \
            --exclude='/blocks' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='npm-debug.log*' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='composer.lock' \
            --exclude='package-lock.json' \
            --exclude='phpcs.xml' \
            --exclude='bs-config.js' \
            --exclude='webpack.config.js' \
            --exclude='postcss.config.js' \
            --exclude='tailwind.config.js' \
            --exclude='references' \
            ./ release-package/mbn-theme/
          
          echo "✅ Release package created"
          
      - name: Create release archive
        run: |
          cd release-package
          zip -r ../mbn-theme-v${{ steps.version.outputs.version }}.zip mbn-theme/
          cd ..
          
          # Verify archive was created
          if [ -f "mbn-theme-v${{ steps.version.outputs.version }}.zip" ]; then
            SIZE=$(du -h "mbn-theme-v${{ steps.version.outputs.version }}.zip" | cut -f1)
            echo "✅ Release archive created: mbn-theme-v${{ steps.version.outputs.version }}.zip ($SIZE)"
          else
            echo "❌ Failed to create release archive"
            exit 1
          fi
      
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          if [ ! -f "CHANGELOG.md" ]; then
            echo "notes=Release $VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract notes between this version header and the next version header
          NOTES=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '1d;$d' | sed '/^$/d' || echo "")
          
          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION"
          fi
          
          # Save to file for multiline content
          echo "$NOTES" > release-notes.txt
          
          echo "Extracted changelog notes:"
          cat release-notes.txt
      
      - name: Create or update git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TAG="${{ steps.version.outputs.tag }}"
          
          # Check if tag exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping tag creation"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "✅ Created and pushed tag $TAG"
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MBN Theme v${{ steps.version.outputs.version }}
          body_path: release-notes.txt
          files: |
            mbn-theme-v${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Release Summary
        run: |
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║          Release Created Successfully! 🎉              ║"
          echo "╚════════════════════════════════════════════════════════╝"
          echo ""
          echo "  Version: ${{ steps.version.outputs.version }}"
          echo "  Tag: ${{ steps.version.outputs.tag }}"
          echo "  Archive: mbn-theme-v${{ steps.version.outputs.version }}.zip"
          echo ""
          echo "Developers can now:"
          echo "  • Pull the latest release: git pull origin main"
          echo "  • Checkout this version: git checkout ${{ steps.version.outputs.tag }}"
          echo "  • Download from GitHub Releases"
          echo ""
          echo "WordPress sites using Plugin Update Checker will"
          echo "automatically detect this new version! ✨"
